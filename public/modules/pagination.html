<div
  th:fragment="pagination(context,prevUrl,nextUrl,totalPages,page,hasPrevious,hasNext)"
  th:if="${hasPrevious || hasNext}"
  th:with="showFirst=${page > 3},
           showStartEllipsis=${page > 4},
           showLast=${page + 2 < totalPages},
           showEndEllipsis=${page + 2 < totalPages - 1}"
>
  <nav
    class="mt-6 flex items-center justify-center gap-1 touch-manipulation"
    th:attr="data-context=${context}"
    th:aria-label="|第${page}页，共${totalPages}页|"
  >
    <!-- 上一页 -->
    <a
      th:if="${hasPrevious}"
      th:href="@{${prevUrl}}"
      class="inline-flex h-9 items-center gap-1 rounded-lg px-3 text-sm font-medium text-gray-600 transition-all hover:bg-gray-100 hover:text-blue-600 dark:text-slate-300 dark:hover:bg-slate-700 dark:hover:text-white"
    >
      <span class="icon-[tabler--chevron-left]"></span>
      <span th:text="#{common.previousPage}"></span>
    </a>
    <span
      th:unless="${hasPrevious}"
      class="inline-flex h-9 cursor-default items-center gap-1 rounded-lg px-3 text-sm font-medium text-gray-300 dark:text-slate-600"
    >
      <span class="icon-[tabler--chevron-left]"></span>
      <span th:text="#{common.previousPage}"></span>
    </span>

    <!-- 首页 -->
    <button
      th:if="${showFirst}"
      type="button"
      onclick="earthquakePaginationGo(this)"
      data-page="1"
      class="inline-flex size-9 items-center justify-center rounded-lg text-sm font-medium text-gray-600 transition-all hover:bg-gray-100 hover:text-blue-600 dark:text-slate-300 dark:hover:bg-slate-700 dark:hover:text-white"
    >1</button>
    <span th:if="${showStartEllipsis}" class="inline-flex size-9 items-center justify-center text-sm text-gray-400 dark:text-slate-500">…</span>

    <!-- 中间页码窗口 (page-2 到 page+2) -->
    <th:block th:each="i : ${#numbers.sequence(1, 5)}">
      <th:block th:with="tp=${page + (i - 3)}">
        <button
          th:if="${tp >= 1 and tp <= totalPages and not (showFirst and tp == 1) and not (showLast and tp == totalPages)}"
          type="button"
          th:disabled="${tp == page}"
          onclick="earthquakePaginationGo(this)"
          th:attr="data-page=${tp}"
          th:text="${tp}"
          th:class="${tp == page}
            ? 'inline-flex size-9 cursor-default items-center justify-center rounded-lg text-sm font-semibold text-white'
            : 'inline-flex size-9 items-center justify-center rounded-lg text-sm font-medium text-gray-600 transition-all hover:bg-gray-100 hover:text-blue-600 dark:text-slate-300 dark:hover:bg-slate-700 dark:hover:text-white'"
          th:style="${tp == page} ? 'background-color:var(--earthquake-primary)' : ''"
        ></button>
      </th:block>
    </th:block>

    <!-- 尾页 -->
    <span th:if="${showEndEllipsis}" class="inline-flex size-9 items-center justify-center text-sm text-gray-400 dark:text-slate-500">…</span>
    <button
      th:if="${showLast}"
      type="button"
      onclick="earthquakePaginationGo(this)"
      th:attr="data-page=${totalPages}"
      th:text="${totalPages}"
      class="inline-flex size-9 items-center justify-center rounded-lg text-sm font-medium text-gray-600 transition-all hover:bg-gray-100 hover:text-blue-600 dark:text-slate-300 dark:hover:bg-slate-700 dark:hover:text-white"
    ></button>

    <!-- 下一页 -->
    <a
      th:if="${hasNext}"
      th:href="@{${nextUrl}}"
      class="inline-flex h-9 items-center gap-1 rounded-lg px-3 text-sm font-medium text-gray-600 transition-all hover:bg-gray-100 hover:text-blue-600 dark:text-slate-300 dark:hover:bg-slate-700 dark:hover:text-white"
    >
      <span th:text="#{common.nextPage}"></span>
      <span class="icon-[tabler--chevron-right]"></span>
    </a>
    <span
      th:unless="${hasNext}"
      class="inline-flex h-9 cursor-default items-center gap-1 rounded-lg px-3 text-sm font-medium text-gray-300 dark:text-slate-600"
    >
      <span th:text="#{common.nextPage}"></span>
      <span class="icon-[tabler--chevron-right]"></span>
    </span>
  </nav>

  <script>
    function earthquakePaginationGo(el) {
      const page = el.dataset.page;
      const context = el.closest('[data-context]').dataset.context;
      window.location.href = context + 'page/' + page;
    }
  </script>
</div>
