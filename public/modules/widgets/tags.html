<section
  class="earthquake-sidebar__card rounded-2xl border border-gray-100 bg-white p-4 shadow-sm transition-all duration-300 hover:shadow-md dark:border-slate-700 dark:bg-slate-800"
>
  <div class="mb-3 flex items-center justify-between gap-3">
    <h2
      class="inline-flex items-center gap-2 text-base font-semibold text-gray-900 dark:text-slate-50"
    >
      <span class="icon-[tabler--tags] text-lg text-purple-500"></span>
      <th:block th:text="#{widget.tags.title}"></th:block>
    </h2>
    <a
      th:href="@{/tags}"
      class="text-xs font-medium text-gray-500 transition hover:text-gray-900 dark:text-slate-400 dark:hover:text-slate-100"
      th:text="#{common.more}"
    >
    </a>
  </div>
  <div class="flex flex-wrap gap-2" th:with="tags = ${tagFinder.list(1,50)}">
    <a
      th:each="tag : ${tags}"
      th:href="@{${tag.status.permalink}}"
      th:title="${tag.spec.displayName}"
      class="inline-flex items-center gap-1 rounded-full border border-gray-200 px-2.5 py-1 text-xs font-medium text-gray-600 transition hover:border-purple-300 hover:bg-purple-50 hover:text-purple-700 dark:border-slate-700 dark:text-slate-300 dark:hover:border-purple-400/50 dark:hover:bg-purple-500/10 dark:hover:text-purple-200"
    >
      <span>#</span>
      <span th:text="${tag.spec.displayName}"></span>
      <sup th:text="${tag.postCount ?: 0}"></sup>
    </a>
  </div>
</section>
