<section
  class="earthquake-sidebar__card rounded-2xl border border-gray-100 bg-white p-4 shadow-sm transition-all duration-300 hover:shadow-md dark:border-slate-700 dark:bg-slate-800"
>
  <h2
    class="mb-3 inline-flex items-center gap-2 text-base font-semibold text-gray-900 dark:text-slate-50"
  >
    <span class="icon-[tabler--stairs-up] text-lg text-red-500"></span>
    <th:block th:text="#{widget.popularPosts.title}"></th:block>
  </h2>
  <ol
    class="space-y-3"
    th:with="posts = ${postFinder.list({page: 1,size: 10,sort: {'stats.visit,desc'}})}"
  >
    <li th:each="post,postStat : ${posts}" class="group flex gap-3">
      <span
        class="mt-0.5 flex size-6 shrink-0 items-center justify-center rounded-lg bg-gray-100 text-xs font-semibold tabular-nums text-gray-500 transition group-hover:bg-red-50 group-hover:text-red-600 dark:bg-slate-700 dark:text-slate-400 dark:group-hover:bg-red-500/10 dark:group-hover:text-red-300"
        th:text="${postStat.count}"
      >
      </span>
      <a
        th:href="@{${post.status.permalink}}"
        th:title="${post.spec.title}"
        class="min-w-0 flex-1"
      >
        <span
          class="line-clamp-2 text-sm font-medium leading-5 text-gray-700 transition group-hover:text-red-600 dark:text-slate-300 dark:group-hover:text-red-300"
          th:text="${post.spec.title}"
        >
        </span>
        <span
          class="mt-1 inline-flex items-center gap-1 text-xs text-gray-400 dark:text-slate-500"
        >
          <span class="icon-[tabler--eye]"></span>
          <span th:text="${post.stats.visit ?: 0}"></span>
        </span>
      </a>
    </li>
  </ol>
</section>
