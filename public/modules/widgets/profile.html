<section
  class="earthquake-sidebar__card overflow-visible rounded-2xl border border-gray-100 bg-white p-4 shadow-sm transition-all duration-300 hover:shadow-md dark:border-slate-700 dark:bg-slate-800"
  th:with="stats = ${siteStatsFinder.getStats()}, profileLogo = ${options?.logo ?: site.logo}, social_media = ${options?.social_media}"
>
  <div class="flex flex-col items-center text-center">
    <a
      href="/"
      class="group relative block size-24 overflow-hidden rounded-2xl"
    >
      <img
        th:if="${not #strings.isEmpty(profileLogo)}"
        th:src="${profileLogo}"
        th:alt="${site.title}"
        loading="lazy"
        decoding="async"
        class="size-full object-cover transition duration-300 group-hover:scale-105"
      />
      <span
        th:if="${#strings.isEmpty(profileLogo)}"
        class="flex size-full items-center justify-center bg-gray-100 text-3xl font-bold text-gray-700 dark:bg-slate-700 dark:text-slate-100"
      >
        <span class="icon-[tabler--bolt]"></span>
      </span>
    </a>

    <h2
      class="mt-4 text-xl font-semibold tracking-tight text-gray-900 dark:text-slate-50"
      th:text="${site.title}"
    ></h2>
    <p
      th:unless="${#strings.isEmpty(site.subtitle)}"
      class="mt-2 line-clamp-3 text-sm leading-6 text-gray-500 dark:text-slate-400"
      th:text="${site.subtitle}"
    ></p>
  </div>

  <dl class="mt-5 grid grid-cols-2 gap-2 text-center">
    <div class="min-w-0 rounded-xl bg-gray-50 px-2 py-2 dark:bg-slate-700/60">
      <dt
        class="text-xs text-gray-500 dark:text-slate-400"
        th:text="#{widget.profile.postCount.label}"
      ></dt>
      <dd
        class="mt-1 text-lg font-semibold tabular-nums text-gray-900 dark:text-slate-50"
      >
        <number-formatter th:attr="value=${stats.post}" />
      </dd>
    </div>
    <div class="min-w-0 rounded-xl bg-gray-50 px-2 py-2 dark:bg-slate-700/60">
      <dt
        class="text-xs text-gray-500 dark:text-slate-400"
        th:text="#{widget.profile.categoryCount.label}"
      ></dt>
      <dd
        class="mt-1 text-lg font-semibold tabular-nums text-gray-900 dark:text-slate-50"
      >
        <number-formatter th:attr="value=${stats.category}" />
      </dd>
    </div>
    <div class="min-w-0 rounded-xl bg-gray-50 px-2 py-2 dark:bg-slate-700/60">
      <dt
        class="text-xs text-gray-500 dark:text-slate-400"
        th:text="#{widget.profile.commentCount.label}"
      ></dt>
      <dd
        class="mt-1 text-lg font-semibold tabular-nums text-gray-900 dark:text-slate-50"
      >
        <number-formatter th:attr="value=${stats.comment}" />
      </dd>
    </div>
    <div class="min-w-0 rounded-xl bg-gray-50 px-2 py-2 dark:bg-slate-700/60">
      <dt
        class="text-xs text-gray-500 dark:text-slate-400"
        th:text="#{widget.profile.visitCount.label}"
      ></dt>
      <dd
        class="mt-1 text-lg font-semibold tabular-nums text-gray-900 dark:text-slate-50"
      >
        <number-formatter th:attr="value=${stats.visit}" />
      </dd>
    </div>
  </dl>

  <div
    th:unless="${#lists.isEmpty(social_media)}"
    class="mt-4 flex flex-wrap justify-center gap-2"
  >
    <th:block th:each="item : ${social_media}">
      <a
        th:if="${item.url_type == 'normal'}"
        th:href="${item.url}"
        th:title="${item.name}"
        target="_blank"
        rel="noopener noreferrer"
        class="inline-flex size-9 items-center justify-center rounded-xl text-gray-500 transition hover:bg-gray-100 hover:text-gray-900 dark:text-slate-400 dark:hover:bg-slate-700 dark:hover:text-slate-100 [&>svg]:size-5"
      >
        <th:block th:utext="${item.icon.value}" />
      </a>
      <button
        th:if="${item.url_type == 'image'}"
        type="button"
        th:attr="data-preview-src=${item.url},data-preview-title=${item.name}"
        th:title="${item.name}"
        class="inline-flex size-9 cursor-pointer items-center justify-center rounded-xl border-0 bg-transparent text-gray-500 transition hover:bg-gray-100 hover:text-gray-900 dark:text-slate-400 dark:hover:bg-slate-700 dark:hover:text-slate-100 [&>svg]:size-5"
      >
        <th:block th:utext="${item.icon.value}" />
      </button>
    </th:block>
  </div>
</section>
