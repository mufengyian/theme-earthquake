<section
  class="earthquake-sidebar__card rounded-2xl border border-gray-100 bg-white p-4 shadow-sm transition-all duration-300 hover:shadow-md dark:border-slate-700 dark:bg-slate-800"
>
  <div class="mb-3 flex items-center justify-between gap-3">
    <h2
      class="inline-flex items-center gap-2 text-base font-semibold text-gray-900 dark:text-slate-50"
    >
      <span class="icon-[tabler--category] text-lg text-emerald-500"></span>
      <th:block th:text="#{widget.categories.title}"></th:block>
    </h2>
    <a
      th:href="@{/categories}"
      class="text-xs font-medium text-gray-500 transition hover:text-gray-900 dark:text-slate-400 dark:hover:text-slate-100"
      th:text="#{common.more}"
    >
    </a>
  </div>
  <div th:with="categories = ${categoryFinder.listAsTree()}">
    <ul class="space-y-1" th:unless="${#lists.isEmpty(categories)}">
      <li
        th:replace="~{modules/category-tree :: single(categories=${categories})}"
      />
    </ul>
  </div>
</section>
