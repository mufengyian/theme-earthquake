apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-earthquake-setting
spec:
  forms:
    - group: layout
      label: 布局
      formSchema:
        - $formkit: select
          name: site_title_size
          label: 站点标题字号
          value: small
          options:
            - label: 小
              value: small
            - label: 中
              value: medium
            - label: 大
              value: large
        - $formkit: select
          name: post_list_layout
          label: 文章列表布局
          value: single
          options:
            - label: 单条
              value: single
            - label: 网格（一行两列）
              value: grid_2
            - label: 网格（一行三列）
              value: grid_3
          help: "选择单条时，文章卡片的图片将位于左侧"
        - $formkit: group
          name: post_card_display
          label: 文章卡片显示设置
          help: 勾选需要在文章卡片中显示的信息。
          value:
            categories: true
            tags: true
            excerpt: true
            publish_time: true
            pin: true
          attrs:
            style: "display:flex;flex-wrap:wrap;gap:8px 16px;"
          children:
            - $formkit: checkbox
              name: categories
              label: 分类
              value: true
            - $formkit: checkbox
              name: tags
              label: 标签
              value: true
            - $formkit: checkbox
              name: excerpt
              label: 摘要
              value: true
            - $formkit: checkbox
              name: publish_time
              label: 发布时间
              value: true
            - $formkit: checkbox
              name: pin
              label: 置顶图标
              value: true
        - $formkit: select
          name: logo_type
          id: logo_type
          label: 菜单栏 Logo 类型
          value: image
          options:
            - label: 文字
              value: text
            - label: 图片
              value: image
        - $formkit: checkbox
          name: show_scroll_button
          label: 显示滚动到顶部按钮
          value: true
        - $formkit: checkbox
          name: show_reading_progress
          label: 显示阅读进度条
          value: true
          help: 在页面顶部显示阅读进度。
        - $formkit: checkbox
          name: enable_glass_navbar
          id: enable_glass_navbar
          label: 毛玻璃导航栏
          value: false
        - $formkit: number
          if: $get(enable_glass_navbar).value
          name: glass_navbar_opacity
          label: 毛玻璃透明度
          value: "0.72"
          min: "0"
          max: "1"
          step: "0.01"
          help: "填写 0 到 1，数值越小越透明。"
        - $formkit: number
          if: $get(enable_glass_navbar).value
          name: glass_navbar_blur
          label: 毛玻璃模糊强度
          value: "0.75"
          min: "0"
          max: "1"
          step: "0.01"
          help: "填写 0 到 1，数值越大越模糊。"

    - group: style
      label: 样式
      formSchema:
        - $formkit: select
          name: font_family
          label: 字体
          value: system
          options:
            - label: 系统默认
              value: system
            - label: Noto Sans SC 思源黑体简体
              value: noto_sans_sc
            - label: Noto Serif SC 思源宋体
              value: noto_serif_sc
            - label: 落霞孤鹜文楷
              value: lxgw_wenkai

        - $formkit: select
          name: style_preset
          label: 主题样式
          value: earthquake
          options:
            - label: 默认
              value: earthquake
            - label: 天蓝色
              value: aqua
            - label: 靛蓝色
              value: indigo
            - label: 青绿色
              value: teal
            - label: 翡翠绿
              value: emerald
            - label: 墨绿色
              value: forest
            - label: 柠檬黄
              value: bumblebee
            - label: 暖橙色
              value: orange
            - label: 焦糖棕
              value: retro
            - label: 樱花粉
              value: cupcake
            - label: 玫红色
              value: rose
            - label: 紫罗兰
              value: pastel
            - label: 极简灰
              value: lofi

        - $formkit: group
          name: color_scheme_settings
          label: 配色设置
          value:
            color_scheme: system
            enable_change_color_scheme: true
            enable_color_scheme_animation: false
          attrs:
            style: "display:flex;flex-wrap:wrap;gap:8px 16px;align-items:flex-start;"
          children:
            - $formkit: select
              name: color_scheme
              label: 默认配色
              value: system
              options:
                - label: 跟随系统
                  value: system
                - label: 深色
                  value: dark
                - label: 浅色
                  value: light
            - $formkit: checkbox
              name: enable_change_color_scheme
              id: enable_change_color_scheme
              label: 允许访客切换配色
              value: true
            - $formkit: checkbox
              name: enable_color_scheme_animation
              label: 切换配色动画
              value: false
              help: 开启后切换配色时显示圆形扩散动画。

    - group: post
      label: 文章
      formSchema:
        - $formkit: select
          name: title_position
          label: 标题位置
          value: "content"
          options:
            - value: "content"
              label: "正文中"
            - value: "cover"
              label: "封面中"
        - $formkit: text
          name: cover_height
          label: 封面图高度
          value: "24rem"
        - $formkit: select
          name: toc_mode
          label: 文章目录显示
          value: both
          options:
            - label: 关闭
              value: none
            - label: 左侧
              value: left
            - label: 文内
              value: inline
            - label: 左侧 + 移动端文内
              value: both
        - $formkit: select
          name: navigation_scope
          label: 上一篇/下一篇范围
          value: all
          options:
            - label: 全站文章
              value: all
            - label: 同主分类
              value: category
        - $formkit: group
          name: post_display
          id: post_display
          label: 文章页显示设置
          help: 勾选需要在文章页中显示的信息与操作。
          value:
            categories: true
            tags: true
            visit: true
            publish_time: true
            navigation: true
            upvote: true
            share: true
          attrs:
            style: "display:flex;flex-wrap:wrap;gap:8px 16px;"
          children:
            - $formkit: checkbox
              name: categories
              label: 分类
              value: true
            - $formkit: checkbox
              name: tags
              label: 标签
              value: true
            - $formkit: checkbox
              name: visit
              label: 浏览量
              value: true
            - $formkit: checkbox
              name: publish_time
              label: 发布时间
              value: true
            - $formkit: checkbox
              name: navigation
              label: 上一篇/下一篇
              value: true
            - $formkit: checkbox
              name: upvote
              label: 点赞按钮
              value: true
            - $formkit: checkbox
              name: share
              label: 分享按钮
              value: true
        - $formkit: checkbox
          name: expand_inline_toc
          label: 展开文内目录
          value: false
        - $formkit: select
          if: "$get(post_display).value.share"
          name: share_item_ids
          key: share_item_ids
          id: share_item_ids
          multiple: true
          sortable: true
          label: 分享平台
          value:
            - wechat
            - x
            - telegram
            - facebook
            - qq
            - qzone
            - weibo
            - douban
            - native
          options:
            - label: 微信
              value: wechat
            - label: X
              value: x
            - label: Telegram
              value: telegram
            - label: Facebook
              value: facebook
            - label: QQ
              value: qq
            - label: QQ 空间
              value: qzone
            - label: 微博
              value: weibo
            - label: 豆瓣
              value: douban
            - label: 系统分享
              value: native

    - group: sidebar
      label: 侧边栏
      formSchema:
        - $formkit: checkbox
          name: show_on_page
          label: 页面显示侧边栏
          value: false
        - $formkit: array
          name: widgets
          label: 小部件
          value:
            - value: popular-posts
            - value: categories
            - value: tags
          itemLabels:
            - type: "text"
              label: "$value.value"
          children:
            - $formkit: select
              name: value
              id: value
              key: value
              label: 部件
              options:
                - label: 站点资料
                  value: profile
                - label: 热门文章
                  value: popular-posts
                - label: 文章分类
                  value: categories
                - label: 文章标签
                  value: tags
            - $formkit: group
              if: "$value.value === profile"
              name: options
              key: profile-options
              id: profile-options
              label: 站点资料选项
              children:
                - $formkit: attachment
                  name: logo
                  label: 站点资料 Logo
                - $formkit: array
                  name: social_media
                  label: 社交媒体
                  value: []
                  itemLabels:
                    - type: "iconify"
                      label: "$value.icon"
                    - type: "text"
                      label: "$value.name"
                    - type: "text"
                      label: "$value.url"
                  children:
                    - $formkit: iconify
                      format: svg
                      name: icon
                      label: 图标
                      validation: "required"
                    - $formkit: text
                      name: name
                      label: 名称
                    - $formkit: text
                      name: url
                      label: 链接
                      validation: "required"
                    - $formkit: select
                      name: url_type
                      label: 链接类型
                      value: normal
                      help: "如果选择了图片类型，那么在访客点击之后会使用弹框的形式加载"
                      options:
                        - label: 跳转链接
                          value: normal
                        - label: 图片
                          value: image
            - $formkit: group
              if: "$value.value === 'popular-posts'"
              name: options
              key: popular-posts-options
              id: popular-posts-options
              label: 热门文章选项
              children:
                - $formkit: number
                  name: post_count
                  label: 显示文章数
                  value: 5
                  min: 3
                  max: 10
                  step: 1
                  help: "填写 3 到 10，默认 5 篇"
            - $formkit: group
              if: "$value.value === 'tags'"
              name: options
              key: tags-options
              id: tags-options
              label: 标签选项
              children:
                - $formkit: checkbox
                  name: show_unused_tags
                  label: 显示零使用的标签
                  value: false
                  help: "关闭后，未被使用过的标签不会显示出来"

    - group: footer
      label: 页脚
      formSchema:
        - $formkit: array
          name: footer_items
          label: 页脚内容
          value:
            - value: copyright
            - value: powered_by
            - value: halo_footer
          itemLabels:
            - type: "text"
              label: "$value.value"
          children:
            - $formkit: select
              name: value
              key: footer_item_value
              label: 内容
              options:
                - label: 版权信息
                  value: copyright
                - label: 架构信息
                  value: powered_by
                - label: Halo 页脚扩展
                  value: halo_footer
                - label: ICP 备案
                  value: icp
                - label: 公安联网备案
                  value: gongan
                - label: 社交媒体
                  value: social_media
            - $formkit: group
              if: "$value.value === 'icp'"
              name: options
              key: icp-options
              label: ICP 备案设置
              children:
                - $formkit: text
                  name: text
                  label: ICP 备案号
            - $formkit: group
              if: "$value.value === 'gongan'"
              name: options
              key: gongan-options
              label: 公安联网备案设置
              children:
                - $formkit: text
                  name: text
                  label: 公安联网备案号
            - $formkit: group
              if: "$value.value === 'social_media'"
              name: options
              key: social-options
              label: 社交媒体
              children:
                - $formkit: array
                  name: items
                  label: 链接
                  value: []
                  itemLabels:
                    - type: "iconify"
                      label: "$value.iconify"
                    - type: "text"
                      label: "$value.name"
                    - type: "text"
                      label: "$value.url"
                  children:
                    - $formkit: iconify
                      name: iconify
                      label: 图标
                      format: svg
                      validation: "required"
                    - $formkit: text
                      name: name
                      label: 名称
                    - $formkit: text
                      name: url
                      label: 链接
                      validation: "required"
                    - $formkit: select
                      name: url_type
                      label: 链接类型
                      value: normal
                      help: "如果选择了图片类型，那么在访客点击之后会使用弹框的形式加载"
                      options:
                        - label: 跳转链接
                          value: normal
                        - label: 图片
                          value: image

    - group: seo
      label: SEO
      formSchema:
        - $formkit: checkbox
          name: enable_og
          label: Open Graph 标签
          value: false
          help: "启用后输出 og:title / og:description / og:image / og:url 等标签。如果已安装「SEO 工具集」插件，建议关闭以避免重复。"
        - $formkit: checkbox
          name: enable_twitter_card
          label: Twitter Card 标签
          value: false
          help: "启用后输出 twitter:card / twitter:title / twitter:description / twitter:image 标签。"
        - $formkit: checkbox
          name: enable_canonical
          label: Canonical URL
          value: false
          help: "启用后输出 <link rel=\"canonical\"> 标签，帮助搜索引擎识别规范链接。"
        - $formkit: checkbox
          name: enable_json_ld
          label: JSON-LD 结构化数据
          value: false
          help: "启用后输出 BlogPosting 类型的 JSON-LD 结构化数据。如果已安装「SEO 工具集」插件，建议关闭以避免重复。"

